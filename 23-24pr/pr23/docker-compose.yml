services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # монтируем конфиг в контейнер
    depends_on:
      - app1
      - app2
      - app3
  app1:
    build: .
    environment:
      - PORT=3000
  app2:
    build: . # Собираем докерфайл в той же директории
    environment:
      - PORT=3001
  app3:
    build: .
    environment:
      - PORT=3002