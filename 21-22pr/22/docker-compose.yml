version: '3.8'

services:
  # Три экземпляра бэкенда на разных портах
  backend1:
    build: ./backend
    container_name: backend1
    environment:
      - PORT=3000
    networks:
      - lb-net
    restart: unless-stopped

  backend2:
    build: ./backend
    container_name: backend2
    environment:
      - PORT=3001
    networks:
      - lb-net
    restart: unless-stopped

  backend3:
    build: ./backend
    container_name: backend3
    environment:
      - PORT=3002
    networks:
      - lb-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - lb-net
    restart: unless-stopped


networks:
  lb-net:
    driver: bridge