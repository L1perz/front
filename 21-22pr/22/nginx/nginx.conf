events { }

http {
    upstream backend_servers {
        # Основные серверы с проверками 
        server backend1:3000 max_fails=2 fail_timeout=30s;
        server backend2:3001 max_fails=2 fail_timeout=30s;
        # Резервный сервер (используется, если оба основных недоступны)
        server backend3:3002 backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}