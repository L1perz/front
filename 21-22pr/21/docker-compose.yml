version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - app-net
    restart: unless-stopped

  app:
    build: .
    container_name: node-cache-app
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge